<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>SHADOW | Image Host</title>
    <style>
        :root { --bg: #000; --accent: #ff003c; --card: #0a0a0a; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        nav {
            background: #000; border-bottom: 1px solid #1a1a1a; padding: 12px; 
            display: flex; flex-direction: row; justify-content: center; gap: 15px; 
            width: 100%; box-sizing: border-box; margin-bottom: 30px;
        }
        nav a { color: #555; text-decoration: none; font-weight: 900; font-size: 0.7rem; letter-spacing: 1px; padding: 10px; }
        nav a.active { color: #fff; background: #111; border-radius: 8px; }

        .upload-zone { width: 90%; max-width: 600px; background: var(--card); border: 2px dashed #222; padding: 40px; border-radius: 25px; text-align: center; cursor: pointer; position: relative; }
        .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        
        .results-list { width: 90%; max-width: 800px; margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
        .result-item { background: var(--card); border: 1px solid var(--border); border-radius: 15px; padding: 10px; display: flex; align-items: center; gap: 15px; }
        .thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .info { flex: 1; overflow: hidden; }
        .copy-btn { background: var(--accent); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<nav>
    <a href="admin.html" style="color: var(--accent);">← POWRÓT</a>
    <a href="converter.html">LINK CONVERTER</a>
    <a href="uploader.html" class="active">IMAGE HOST</a>
</nav>

<div class="upload-zone">
    <b>PRZECIĄGNIJ LUB KLIKNIJ (MAX 20 ZDJĘĆ)</b>
    <input type="file" multiple accept="image/*" onchange="handleFiles(this.files)">
</div>

<div class="results-list" id="results-list"></div>

<script>
    const IMGBB_API_KEY = '931e2ae178a9b338db4f43062ea43160';

    async function handleFiles(files) {
        for (let file of files) {
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) addResult(file.name, data.data.url);
            } catch (e) { console.error(e); }
        }
    }

    function addResult(name, url) {
        const list = document.getElementById('results-list');
        const div = document.createElement('div');
        div.className = 'result-item';
        div.innerHTML = `<img src="${url}" class="thumb"><div class="info"><b>${name}</b><br><small>${url}</small></div><button class="copy-btn" onclick="copy('${url}')">KOPIUJ</button>`;
        list.prepend(div);
    }

    function copy(url) { navigator.clipboard.writeText(url); alert("Link skopiowany!"); }
</script>
</body>
</html>
