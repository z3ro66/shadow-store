<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowStore | Beats</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #050505; --accent: #ff003c; --card: #0e0e0e; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 40px; padding-bottom: 120px; }
        .back-btn { position: fixed; top: 20px; left: 20px; color: #555; text-decoration: none; font-size: 14px; z-index: 100; transition: 0.3s; }
        .back-btn:hover { color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 40px; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: #333; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 15px; }
        
        .play-btn { background: white; color: black; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .buy-btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .buy-btn:hover { box-shadow: 0 0 15px var(--accent); }

        #player-bar { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(15px);
            border-top: 1px solid #222; padding: 15px 0; 
            display: none; flex-direction: column; align-items: center; z-index: 1000;
        }
        .player-info { margin-bottom: 8px; font-size: 0.9rem; font-weight: bold; color: #fff; }
        .player-controls { display: flex; align-items: center; gap: 20px; width: 90%; max-width: 600px; }
        
        .progress-container { flex-grow: 1; height: 6px; background: #222; border-radius: 3px; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 3px; position: relative; }
        .progress-bar::after { content: ''; position: absolute; right: -4px; top: -4px; width: 14px; height: 14px; background: white; border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        
        .time-display { font-family: monospace; font-size: 12px; color: #888; min-width: 40px; }
        .main-play-pause { background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        /* Styl dla limitu */
        .limit-reached { background: #444 !important; }
        .limit-msg { color: var(--accent); font-size: 0.7rem; text-transform: uppercase; margin-top: 2px; }

    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← POWRÓT</a>
    <h1 id="b-title">...</h1>
    <p id="b-desc" style="color:#888"></p>
    <div class="grid" id="beats-grid"></div>

    <div id="player-bar">
        <div id="p-track-name" class="player-info">Wybrany bit...</div>
        <div class="player-controls">
            <span class="time-display" id="curr-time">0:00</span>
            <div class="progress-container" id="prog-cont">
                <div class="progress-bar" id="prog-bar"></div>
            </div>
            <span class="time-display" id="total-time">0:42</span>
            <button class="main-play-pause" id="master-play" onclick="toggleAudio()">▶</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLj6TIdHvupZhXTgf2fideGGZSgBkgOHM",
            authDomain: "shadowstore-49ff4.firebaseapp.com",
            projectId: "shadowstore-49ff4",
            storageBucket: "shadowstore-49ff4.firebasestorage.app",
            appId: "1:286001305055:web:81e1762b09058fadb6a06a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Stała limitu sekund
        const LIMIT_SEC = 42;

        db.collection("content").doc("beats_page").onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('b-title').innerText = doc.data().title;
                document.getElementById('b-desc').innerText = doc.data().description;
            }
        });

        db.collection("products").where("category", "==", "beat").onSnapshot(snap => {
            const g = document.getElementById('beats-grid');
            g.innerHTML = '';
            let prods = [];
            snap.forEach(doc => prods.push({id: doc.id, ...doc.data()}));
            prods.sort((a,b) => b.createdAt - a.createdAt);

            prods.forEach(p => {
                g.innerHTML += `<div class="card">
                    <img src="${p.cover || 'https://via.placeholder.com/300'}">
                    <h3>${p.name}</h3><p>${p.price} PLN</p>
                    <button class="play-btn" onclick="initAudio('${p.audio}', '${p.name.replace(/'/g, "")}')">▶ PREVIEW</button>
                    <a href="${p.shopUrl}" onclick="clickBtn('${p.id}')" target="_blank" class="buy-btn">BUY</a>
                </div>`;
            });
        });

        let audio = new Audio();
        const pBar = document.getElementById('player-bar');
        const pTrack = document.getElementById('p-track-name');
        const pBtn = document.getElementById('master-play');
        const progBar = document.getElementById('prog-bar');
        const progCont = document.getElementById('prog-cont');

        function initAudio(url, name) {
            if(!url) return;
            if(audio.src === url) {
                if(audio.currentTime >= LIMIT_SEC) {
                    audio.currentTime = 0; // Resetuj jeśli ktoś klika znów w ten sam zablokowany bit
                }
                toggleAudio(); 
                return; 
            }
            
            audio.pause();
            audio.src = url;
            audio.play();
            pTrack.innerText = name;
            pTrack.style.color = "#fff";
            pBar.style.display = 'flex';
            pBtn.innerText = "⏸";
            progBar.classList.remove('limit-reached');
        }

        function toggleAudio() {
            if(audio.currentTime >= LIMIT_SEC) return; // Blokada przycisku Play po limicie
            if(audio.paused) { audio.play(); pBtn.innerText = "⏸"; } 
            else { audio.pause(); pBtn.innerText = "▶"; }
        }

        audio.ontimeupdate = () => {
            // Sprawdzenie limitu
            if(audio.currentTime >= LIMIT_SEC) {
                audio.pause();
                audio.currentTime = LIMIT_SEC; // Ustaw na sztywno 42s
                pBtn.innerText = "▶";
                pTrack.innerText = "LIMIT PREVIEW (42s) - KUP BIT ABY USŁYSZEĆ CAŁOŚĆ";
                pTrack.style.color = "var(--accent)";
                progBar.classList.add('limit-reached');
            }

            // Obliczanie paska względem limitu lub pełnego czasu
            const currentLimit = (audio.duration < LIMIT_SEC) ? audio.duration : LIMIT_SEC;
            const perc = (audio.currentTime / currentLimit) * 100;
            progBar.style.width = perc + "%";
            
            document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-time').innerText = formatTime(currentLimit);
        };

        progCont.onclick = (e) => {
            const width = progCont.clientWidth;
            const clickX = e.offsetX;
            const currentLimit = (audio.duration < LIMIT_SEC) ? audio.duration : LIMIT_SEC;
            const newTime = (clickX / width) * currentLimit;
            
            if(newTime <= LIMIT_SEC) {
                audio.currentTime = newTime;
                if(newTime < LIMIT_SEC && audio.paused) toggleAudio();
            }
        };

        function formatTime(sec) {
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return m + ":" + (s < 10 ? "0" + s : s);
        }

        function clickBtn(id) { db.collection("products").doc(id).update({ clicks: firebase.firestore.FieldValue.increment(1) }); }
    </script>
</body>
</html>
