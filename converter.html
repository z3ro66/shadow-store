<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>SHADOW | Link Converter</title>
<style>
:root{--bg:#000;--accent:#ff003c;--blue:#00d2ff;--border:rgba(255,255,255,.08)}body{background:var(--bg);color:#fff;font-family:'Inter',sans-serif;margin:0;padding:0;display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-user-select:none}nav{background:#000;border-bottom:1px solid #1a1a1a;padding:12px;display:flex;flex-direction:row;justify-content:center;gap:15px;width:100%;box-sizing:border-box}nav a{color:#555;text-decoration:none;font-weight:900;font-size:.7rem;letter-spacing:1px;padding:10px;transition:.3s}nav a.active{color:#fff;background:#111;border-radius:8px}.wrapper{width:90%;max-width:800px;padding:40px 0}h1{letter-spacing:3px;font-size:1.5rem}textarea{width:100%;height:150px;background:#0a0a0a;border:1px solid var(--border);border-radius:15px;color:#fff;padding:15px;box-sizing:border-box;font-family:monospace;resize:none}button{background:var(--accent);color:#fff;border:none;padding:15px;border-radius:12px;width:100%;font-weight:900;cursor:pointer;margin-top:15px;transition:.3s}button:hover{box-shadow:0 0 20px rgba(255,0,60,.4)}.results{margin-top:30px;background:#0a0a0a;border-radius:20px;border:1px solid var(--border);overflow:hidden}.res-row{display:grid;grid-template-columns:1fr 2fr;border-bottom:1px solid var(--border);cursor:pointer;transition:.2s}.res-row div{padding:12px;font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.name-cell{color:var(--blue);border-right:1px solid var(--border);font-weight:700}.link-cell{color:#666;font-family:monospace}.res-row:hover{background:rgba(255,255,255,.05)}
</style>
<script>
/* Security Layer */
document.addEventListener('contextmenu',e=>e.preventDefault());
document.onkeydown=function(e){if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&(e.keyCode==73||e.keyCode==74))||(e.ctrlKey&&e.keyCode==85))return false}
</script>
</head>
<body oncontextmenu="return false">

<nav>
    <a href="admin.html" style="color:var(--accent)">← POWRÓT</a>
    <a href="converter.html" class="active">🔗 LINK CONVERTER</a>
    <a href="uploader.html">IMAGE HOST</a>
</nav>

<div class="wrapper">
    <h1>LINK CONVERTER</h1>
    <textarea id="_inL" placeholder="Wklej linki z Dropboxa..."></textarea>
    <button id="_procB">KONWERTUJ</button>

    <div class="results" id="_resB" style="display:none">
        <div id="_grid"></div>
    </div>
</div>

<script>
(function(){
    const _0xT=['ZHJvcGJveC5jb20=','ZHJvcGJveHVzZXJjb250ZW50LmNvbQ==','cmxrZXk9','U2tvcGlvd2FubyBsaW5rIQ=='];
    const _0xR=i=>atob(_0xT[i]);

    document.getElementById('_procB').onclick=function(){
        const v=document.getElementById('_inL').value;
        const g=document.getElementById('_grid');
        const l=v.split('\n');
        g.innerHTML='';

        l.forEach(s=>{
            let r=s.trim();
            if(!r.includes(_0xR(0)))return;

            let fN=decodeURIComponent(r.split('/').pop().split('?')[0]).replace(/\.(mp3|wav)/gi,'').replace(/-/g,' ');
            let dL=r.replace('www.'+_0xR(0),_0xR(1));
            
            if(dL.includes(_0xR(2))){
                let k=dL.split(_0xR(2))[1].split('&')[0];
                dL=dL.split('?')[0]+'?'+_0xR(2)+k;
            }

            const row=document.createElement('div');
            row.className='res-row';
            row.innerHTML=`<div class="name-cell">${fN}</div><div class="link-cell">${dL}</div>`;
            row.onclick=()=>{
                navigator.clipboard.writeText(dL);
                alert(_0xR(3));
            };
            g.appendChild(row);
        });
        document.getElementById('_resB').style.display='block';
    };
})();
</script>
</body>
</html>
