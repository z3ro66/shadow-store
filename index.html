<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShadowStore | Official</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg: #050505; 
            --accent: #ff003c; 
            --card: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-secondary: #666;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow: hidden;
        }

        /* Hero Section */
        .hero-img { 
            width: 100%; 
            max-width: 600px; 
            height: auto; 
            aspect-ratio: 16/9; 
            object-fit: cover; 
            border-radius: 30px; 
            border: 1px solid var(--border); 
            margin-bottom: 25px; 
            background: #111; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.6); 
            transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        h1 { 
            font-size: clamp(2.5rem, 8vw, 4rem); 
            margin: 0; 
            letter-spacing: -4px; 
            font-weight: 900; 
            text-transform: uppercase;
            line-height: 0.9;
        }

        p { 
            color: var(--text-secondary); 
            max-width: 400px; 
            line-height: 1.5; 
            margin: 15px 0 100px 0; 
            font-size: 0.95rem; 
            font-weight: 500;
        }

        /* --- NOWE MENU --- */
        .nav-bar { 
            position: fixed; 
            bottom: 40px; 
            display: flex; 
            gap: 10px; 
            background: rgba(10,10,10,0.7); 
            padding: 10px; 
            border-radius: 35px; 
            backdrop-filter: blur(25px) saturate(180%); 
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border); 
            z-index: 100; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .nav-bar a { 
            color: #eee; 
            text-decoration: none; 
            padding: 14px 22px; 
            border-radius: 28px; 
            font-weight: 800; 
            font-size: 0.75rem; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid transparent;
            background: rgba(255,255,255,0.03);
        }

        /* Style dla poszczególnych przycisków */
        .nav-bar a:nth-child(1):hover { /* BITS */
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .nav-bar a:nth-child(2):hover { /* KITS */
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        /* TOOLS - zostaje jako Twój wyróżnik */
        .nav-bar a.tools-btn { 
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid rgba(255, 0, 60, 0.3);
            color: var(--accent);
        }

        .nav-bar a.tools-btn:hover { 
            background: var(--accent); 
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 0, 60, 0.4);
        }

        /* Watermark */
        .watermark { 
            position: fixed; 
            bottom: 15px; 
            font-size: 9px; 
            letter-spacing: 4px; 
            color: rgba(255,255,255,0.15); 
            font-weight: 900; 
            text-transform: uppercase; 
        }

        @media (max-width: 480px) { 
            .nav-bar { width: 92%; gap: 6px; padding: 8px; bottom: 30px; }
            .nav-bar a { padding: 12px 14px; font-size: 0.65rem; letter-spacing: 1px; }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="watermark">SHADOW ENGINE v2.0</div>

    <img id="h-img" src="" class="hero-img" style="display:none" alt="Shadow Store Hero">
    <h1 id="h-title">SHADOW</h1>
    <p id="h-desc">Premium sounds for the next generation.</p>

    <nav class="nav-bar">
        <a href="beats.html"><span>🎹</span> BITS</a>
        <a href="kits.html"><span>📦</span> KITS</a>
        <a href="tools.html" class="tools-btn"><span>🛠️</span> TOOLS</a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLj6TIdHvupZhXTgf2fideGGZSgBkgOHM",
            authDomain: "shadowstore-49ff4.firebaseapp.com",
            projectId: "shadowstore-49ff4",
            storageBucket: "shadowstore-49ff4.firebasestorage.app",
            messagingSenderId: "286001305055",
            appId: "1:286001305055:web:81e1762b09058fadb6a06a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function render(data) {
            if(data.title) document.getElementById('h-title').innerText = data.title;
            if(data.description) document.getElementById('h-desc').innerText = data.description;
            if(data.imgUrl) {
                const img = document.getElementById('h-img');
                img.src = data.imgUrl;
                img.style.display = 'block';
            }
        }

        const cache = localStorage.getItem('cache_home');
        if(cache) render(JSON.parse(cache));

        db.collection("content").doc("homepage").onSnapshot((doc) => {
            if(doc.exists) {
                render(doc.data());
                localStorage.setItem('cache_home', JSON.stringify(doc.data()));
            }
        });
    </script>
</body>
</html>
