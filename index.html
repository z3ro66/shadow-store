<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShadowStore</title>
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #050505; --accent: #ff003c; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; box-sizing: border-box; }
        .hero-img { width: 100%; max-width: 700px; height: auto; aspect-ratio: 16/9; object-fit: cover; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; background: #111; box-shadow: 0 20px 50px rgba(0,0,0,0.5); transition: 0.3s; }
        h1 { font-size: calc(2.2rem + 2vw); margin: 5px 0; letter-spacing: -1px; font-weight: 700; }
        p { color: #888; max-width: 500px; line-height: 1.6; margin-bottom: 100px; font-size: 0.95rem; }
        .nav-bar { position: fixed; bottom: 30px; display: flex; gap: 8px; background: rgba(20,20,20,0.8); padding: 8px; border-radius: 50px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        .nav-bar a { color: white; text-decoration: none; padding: 12px 20px; border-radius: 40px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .nav-bar a:hover { background: var(--accent); transform: scale(1.05); }
        .watermark { position: fixed; bottom: 15px; right: 20px; font-size: 10px; letter-spacing: 2px; color: rgba(255,255,255,0.15); font-weight: bold; pointer-events: none; text-transform: uppercase; z-index: 10; }
        @media (max-width: 480px) { .watermark { right: 50%; transform: translateX(50%); bottom: 5px; } }
    </style>
</head>
<body>
    <div class="watermark">® Z3RO 2026</div>
    <img id="h-img" src="" class="hero-img" style="display:none">
    <h1 id="h-title">...</h1>
    <p id="h-desc">...</p>
    <nav class="nav-bar">
        <a href="beats.html">BITS</a>
        <a href="kits.html">DRUM KITS</a>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLj6TIdHvupZhXTgf2fideGGZSgBkgOHM",
            authDomain: "shadowstore-49ff4.firebaseapp.com",
            projectId: "shadowstore-49ff4",
            storageBucket: "shadowstore-49ff4.firebasestorage.app",
            messagingSenderId: "286001305055",
            appId: "1:286001305055:web:81e1762b09058fadb6a06a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function render(data) {
            document.getElementById('h-title').innerText = data.title || "SHADOW STORE";
            document.getElementById('h-desc').innerText = data.description || "";
            if(data.imgUrl) {
                const img = document.getElementById('h-img');
                img.src = data.imgUrl;
                img.style.display = 'block';
            }
        }

        // 1. Ładuj natychmiast z LocalStorage
        const cache = localStorage.getItem('cache_home');
        if(cache) render(JSON.parse(cache));

        // 2. Pobierz z Firebase i zaktualizuj cache
        db.collection("content").doc("homepage").onSnapshot(doc => {
            if(doc.exists) {
                render(doc.data());
                localStorage.setItem('cache_home', JSON.stringify(doc.data()));
            }
        });
    </script>
</body>
</html>
